name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Lint
        run: npm run lint || true

      - name: Create release zip
        run: |
          mkdir -p dist
          zip -r dist/shopthai.zip . -x node_modules/**\* .git/**\* .next/**\* dist/**\* .github/**\*

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: shopthai-dist
          path: dist/shopthai.zip
